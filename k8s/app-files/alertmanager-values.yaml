alertmanager:
  alertmanagerSpec:
    secrets:
      - slack-webhook-secret
  config:
    global:
      slack_api_url_file: '/etc/alertmanager/secrets/slack-webhook-secret/url'
    route:
      receiver: 'slack-notifications'
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h
      routes:
      - match:
          alertname: NodeAppDown
        receiver: 'slack-notifications'
    receivers:
    - name: 'slack-notifications'
      slack_configs:
      - channel: '#iti-test'
        send_resolved: true
        title: '{{ template "slack.default.title" . }}'
        text: >-
          {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Severity:* `{{ .Labels.severity }}`
          {{ end }}
